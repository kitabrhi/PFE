name: Cypress BDD Scheduled Tests

on:
  workflow_dispatch:
  push:
    branches: [main, develop, typescript-migration]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 8 * * 1'
    - cron: '0 10 * * 1'
    - cron: '30 13 * * 1'
    - cron: '15 9 * * 2'
    - cron: '0 16 * * 2'
    - cron: '45 10 * * 3'
    - cron: '20 14 * * 3'
    - cron: '0 9 * * 4'
    - cron: '30 16 * * 4'
    - cron: '50 16 * * 4'
    - cron: '30 17 * * 4'
    - cron: '10 8 * * 5'
    - cron: '0 14 * * 5'
    - cron: '0 15 * * 5'
    - cron: '0 10 * * 6'

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # ← obligatoire pour git push
    strategy:
      fail-fast: false
    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🟢 Installation de Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 📦 Installation des dépendances
        run: npm install

      - name: 🧪 Lancer les tests Cypress (Cucumber BDD)
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          headed: false
        env:
          CYPRESS_BASE_URL: ${{ secrets.CYPRESS_BASE_URL }}

      - name: 📝 Créer un commit de log   # ← nouvelle étape
        if: always()
        run: |
          git config user.name "kitabrhi"
          git config user.email "kitabrhi.youssef.1@gmail.com" 
          echo "Run #${{ github.run_number }} — $(date -u)" >> test-logs/run-history.log
          git add test-logs/run-history.log
          git commit -m "ci: scheduled test run #${{ github.run_number }}"
          git pull --rebase
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📊 Upload des rapports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-reports-${{ github.run_number }}
          path: |
            cypress/reports/
            cypress/screenshots/
            cypress/videos/
          retention-days: 7